<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCraft | Voxel Engine</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <!-- Crosshair -->
        <div id="crosshair">+</div>

        <!-- HUD -->
        <div id="hud">
            <div class="inventory">
                <div class="slot active" data-block="1"></div>
                <div class="slot" data-block="2"></div>
                <div class="slot" data-block="3"></div>
                <div class="slot" data-block="4"></div>
                <div class="slot" data-block="5"></div>
            </div>
        </div>

        <!-- Instructions Overlay -->
        <div id="instructions">
            <div class="menu-card">
                <h1>VIBECRAFT</h1>
                <p>Click to Start</p>
                <div class="controls">
                    <span>(W,A,S,D) Move</span>
                    <span>(SPACE) Jump</span>
                    <span>(LEFT CLICK) Break</span>
                    <span>(RIGHT CLICK) Place</span>
                    <span>(ESC) Menu</span>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
