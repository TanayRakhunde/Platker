<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandCursor | AI Interaction</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <!-- Hand Monitor (Side Panel) -->
        <div class="hand-monitor">
            <div class="monitor-title">AI VISION MONITOR</div>
            <div class="camera-wrapper">
                <video id="input_video" playsinline></video>
                <canvas id="output_canvas"></canvas>
            </div>
            <div class="monitor-stats">
                <span id="tracking-status">INIT...</span>
                <span id="current-action">IDLE</span>
            </div>
        </div>

        <!-- Hand Cursors -->
        <div id="cursor-right" class="hand-cursor right">
            <div class="cursor-ring"></div>
            <div class="cursor-label">R</div>
        </div>
        <div id="cursor-left" class="hand-cursor left">
            <div class="cursor-ring"></div>
            <div class="cursor-label">L</div>
        </div>

        <!-- Interaction UI -->
        <div class="ui-overlay">
            <header>
                <div class="logo">HAND<span>OS PRO</span></div>
            </header>

            <div id="game-container">
                <div class="text-zone">
                    <div class="input-group">
                        <label>SOURCE (SELECT & FIST TO COPY)</label>
                        <div id="source-text" class="text-editor" contenteditable="true">The fox jumped over the lazy dog. Try selecting this text with your right hand pinch hold, then make a fist with your left hand to copy!</div>
                    </div>
                    <div class="input-group">
                        <label>TARGET (OPEN LEFT HAND TO PASTE)</label>
                        <div id="target-text" class="text-editor" contenteditable="true" data-placeholder="Paste here..."></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Start Overlay -->
        <div id="start-overlay">
            <div class="menu-card">
                <h2>AI Vision Interface</h2>
                <p>Allow camera access to transform your hand into a digital controller.</p>
                <button class="btn btn-primary" id="start-btn">ENABLE SENSORS</button>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
