<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platker | AI Platformer Creation</title>
    <meta name="description" content="Draw your level on paper and let AI bring it to life in this next-gen platformer game.">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bg-mesh"></div>
    
    <div id="app">
        <div class="container">
            <header>
                <div class="logo">PLATKER</div>
                <nav>
                    <button class="btn btn-glass" id="settings-btn">Settings</button>
                </nav>
            </header>

            <main>
                <div class="game-container" id="game-wrapper">
                    <canvas id="gameCanvas"></canvas>
                    
                    <div class="overlay" id="main-menu">
                        <div class="menu-card float">
                            <h2>Welcome to Platker</h2>
                            <p>Draw your own levels or play the starter missions. Experience creativity without limits.</p>
                            <button class="btn btn-primary" id="start-btn">
                                <span>PLAY NOW</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="controls-hint">
                    <div class="hint-item">
                        <span class="key">W</span>
                        <span class="key">A</span>
                        <span class="key">S</span>
                        <span class="key">D</span>
                        <span>Move & Jump</span>
                    </div>
                    <div class="hint-item">
                        <span class="key">R</span>
                        <span>Restart Level</span>
                    </div>
                </div>

                <section class="uploader-section">
                    <div class="uploader-card" id="drop-zone">
                        <div class="uploader-icon">✦</div>
                        <h3>Create Your Own Level</h3>
                        <p>Upload a photo of your drawing on paper. Our AI will analyze the lines and generate a playable world.</p>
                        <input type="file" id="file-input" hidden accept="image/*">
                        <div class="btn-group">
                            <button class="btn btn-glass" onclick="document.getElementById('file-input').click()">SELECT IMAGE</button>
                            <button class="btn btn-primary" id="camera-btn">USE CAMERA</button>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Camera Modal -->
    <div class="overlay hidden" id="camera-modal">
        <div class="menu-card" style="max-width: 640px;">
            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="capture-canvas" style="display: none;"></canvas>
            </div>
            <div class="btn-group" style="margin-top: 1.5rem; justify-content: center;">
                <button class="btn btn-glass" id="close-camera">CANCEL</button>
                <button class="btn btn-primary" id="capture-btn">CAPTURE LEVEL</button>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
