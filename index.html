<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandCursor | AI Interaction</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app">
        <!-- Hand Monitor (Side Panel) -->
        <div class="hand-monitor">
            <div class="monitor-title">AI VISION MONITOR</div>
            <div class="camera-wrapper">
                <video id="input_video" playsinline></video>
                <canvas id="output_canvas"></canvas>
            </div>
            <div class="monitor-stats">
                <span id="tracking-status">INIT...</span>
                <span id="current-action">IDLE</span>
            </div>
        </div>

        <!-- Hand Cursor -->
        <div id="hand-cursor">
            <div class="cursor-ring"></div>
            <div class="cursor-point"></div>
        </div>

        <!-- Interaction UI -->
        <div class="ui-overlay">
            <header>
                <div class="logo">HAND<span>OS</span></div>
            </header>

            <div id="game-container">
                <div class="desktop-grid">
                    <div class="icon-box" id="btn-1">
                        <div class="icon">📁</div>
                        <span>FILES</span>
                    </div>
                    <div class="icon-box" id="btn-2">
                        <div class="icon">🌐</div>
                        <span>WEB</span>
                    </div>
                    <div class="icon-box" id="btn-3">
                        <div class="icon">⚙️</div>
                        <span>SETTINGS</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Start Overlay -->
        <div id="start-overlay">
            <div class="menu-card">
                <h2>AI Vision Interface</h2>
                <p>Allow camera access to transform your hand into a digital controller.</p>
                <button class="btn btn-primary" id="start-btn">ENABLE SENSORS</button>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
